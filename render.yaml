services:
  - type: web
    name: sellcruiting-lebenslauferstellung
    env: python
    region: frankfurt
    plan: starter
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn src.webhook_server:app --host 0.0.0.0 --port $PORT
    envVars:
      # ── LLM APIs ──────────────────────────────────────────────────
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-2024-08-06
      - key: ANTHROPIC_API_KEY
        sync: false

      # ── HOC API ───────────────────────────────────────────────────
      - key: HIRINGS_API_URL
        sync: false
      - key: HIRING_API_TOKEN
        sync: false

      # ── Datenbank ─────────────────────────────────────────────────
      - key: DATABASE_URL
        sync: false

      # ── ElevenLabs ────────────────────────────────────────────────
      - key: ELEVENLABS_API_KEY
        sync: false

      # ── Analytics ─────────────────────────────────────────────────
      - key: ANALYTICS_API_KEY
        sync: false

      # ── WhatsApp Bot (Meta Cloud API) ─────────────────────────────
      - key: WHATSAPP_ENABLED
        value: "false"           # auf "true" setzen wenn Testphase abgeschlossen
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_WABA_ID
        sync: false
      - key: WHATSAPP_API_TOKEN
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_API_VERSION
        value: v22.0
      - key: WHATSAPP_TEMPLATE_NAME
        sync: false              # Name des genehmigten Meta-Templates eintragen
      - key: WHATSAPP_APP_SECRET
        sync: false
      - key: WHATSAPP_SESSION_TIMEOUT_HOURS
        value: "24"

      # ── Pipeline-Optionen ─────────────────────────────────────────
      - key: USE_MCP_TEMPORAL_VALIDATION
        value: "false"
      - key: DEFAULT_PROTOCOL_TEMPLATE_ID
        value: "63"
      - key: VOICEMAIL_TRANSCRIPT_OVERRIDE
        value: "true"

    healthCheckPath: /health
    autoDeploy: true
